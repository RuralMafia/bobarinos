<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bob-a-Rino's Pizza Delivery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #aad3df; }
        #hud {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            z-index: 1000;
            text-align: center;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="hud">🍕 Bob-a-Rino's Pizza Delivery</div>
    <div id="instructions">Use Arrow Keys to drive the scooter 🛵</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map setup
        const map = L.map('map', {
            zoomControl: false,
            scrollWheelZoom: false,
            doubleClickZoom: false,
            touchZoom: false,
            keyboard: false,
        }).setView([37.7820, -90.4185], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // Wait for map to load before adding markers
        map.whenReady(() => {
            console.log('Map loaded!');
        });

        // Pizza shop marker
        const pizzaIcon = L.divIcon({
            html: '🍕',
            className: '',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });
        const pizzaShop = L.marker([37.7820, -90.4185], { icon: pizzaIcon }).addTo(map);
        pizzaShop.bindPopup("<b>🍕 Bob-a-Rino's</b><br>11 N. Jefferson Street");

        // Delivery marker
        const deliveryIcon = L.divIcon({
            html: '📦',
            className: '',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });
        const deliveryMarker = L.marker([37.7835, -90.4160], { icon: deliveryIcon }).addTo(map);
        deliveryMarker.bindPopup("<b>📦 Deliver Here!</b><br>Customer is waiting...");

        // Scooter
